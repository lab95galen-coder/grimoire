<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стольник - Ассистент Blood on the Clocktower</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --border-color: #2c2c35;
            --text-color: #e2e2e9;
            --accent-color: #9d2a2a;
            --accent-hover: #bd3a3a;
        }

        body {
            background-image: url('Задник.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(18, 18, 20, 0.85);
            background-blend-mode: overlay;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e2e2e9;
            margin: 0;
            padding: 10px;
            padding-bottom: 30px;
        }

        h1, h2, h3 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
        }

        .header-logo {
            text-align: center;
            margin: 20px 0;
        }

        .header-logo img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, button {
            background-color: #222227;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input { flex: 2; }
        
        button.btn-add {
            background-color: var(--accent-color);
            border: none;
            flex: 1;
            cursor: pointer;
            font-weight: bold;
        }

        button.btn-add:hover { background-color: var(--accent-hover); }

        .phase-control {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .phase-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .phase-btn {
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #3d3d45;
            text-align: center;
            background-color: #222227;
            transition: all 0.2s ease;
        }

        .phase-btn.active-start { background-color: #2a527a; border-color: #3b73ad; color: #fff; }
        .phase-btn.active-night { background-color: #422a7a; border-color: #5c3bad; color: #fff; }
        .phase-btn.active-day { background-color: #7a6e2a; border-color: #ad9c3b; color: #fff; }

        .audio-status {
            text-align: center;
            font-size: 0.8rem;
            color: #8ec5fc;
            margin-top: 4px;
        }

        .timer-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222227;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 12px;
        }

        .timer-display {
            font-size: 1.6rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffda6a;
        }

        .timer-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 6px;
            background: #333;
            border: 1px solid #444;
        }

        .setup-pool {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ЦВЕТА КОМАНД И КАРТОЧЕК */
        .card-горожанин {
            background: #121e2b !important;
            border: 2px solid #3399ff !important;
        }
        .card-изгой {
            background: #23201d !important;
            border: 2px solid #d4c5b9 !important;
        }
        .card-приспешник {
            background: #2b1212 !important;
            border: 2px solid #ff4444 !important;
        }
        .card-демон {
            background: #380808 !important;
            border: 2px solid #ff0000 !important;
        }

        .badge-горожанин { color: #8ec5fc; }
        .badge-изгой { color: #e6d3c3; }
        .badge-приспешник { color: #ff9999; }
        .badge-демон { color: #ff4444; font-weight: bold; }

        .night-guide h3 {
            margin-top: 15px;
            text-align: left;
            font-size: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            color: #d4af37;
        }

        .clear-btn {
            background: #333;
            color: #aaa;
            border: none;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin: 20px 0;">
        <img src="ЛОГО.png" style="width: 250px; height: auto;">
    </div>

    <div class="card" id="setupCard">
        <h2>Новая партия</h2>
        <div class="flex-row">
            <input type="number" id="totalPlayersCount" placeholder="Количество игроков (5-15)" min="5" max="15">
            <button class="btn-add" onclick="setupGame()">Рассчитать</button>
        </div>
    </div>

    <div class="card">
        <h2>🎹 Саундтрек и Фазы партии</h2>
        <div class="phase-control">
            <div class="phase-control" style="margin-top: 10px;">
                <button class="phase-btn" style="background:#1a4d80; border-color:#3399ff;" onclick="endGame('добро')">🎉 Победа Горожан</button>
                <button class="phase-btn" style="background:#7a2a2a; border-color:#ff4444;" onclick="endGame('зло')">👹 Победа Демона</button>
            </div>
            <button id="btnPhaseStart" class="phase-btn" onclick="switchPhase('start')">🎬 НАЧАТЬ ИГРУ (Эпилог - 1 раз)</button>
            <div class="phase-grid-3">
                <button id="btnPhaseNight" class="phase-btn" onclick="switchPhase('night')">🌙 НОЧЬ (По кругу)</button>
                <button id="btnPhaseDay" class="phase-btn" onclick="switchPhase('day')">☀️ ДЕНЬ (По кругу)</button>
                <button id="btnPhaseStop" class="phase-btn" style="border-color:#5c2121; color:#ff8888;" onclick="switchPhase('stop')">⏹ СТОП ЗВУК</button>
            </div>
        </div>
        <div id="audioStatusText" class="audio-status">Музыка готова к запуску</div>

        <div class="timer-block">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>⏱ Последнее слово:</span>
                <input type="number" id="timerInput" value="30" style="padding: 4px; width: 50px; text-align: center; font-size: 0.9rem;">
                <span>сек.</span>
            </div>
            <div class="timer-display" id="timerDisplay">00:30</div>
            <div style="display: flex; gap: 4px;">
                <button class="timer-btn" id="timerStartBtn" onclick="toggleTimer()" style="background: #2a7a2a;">Старт</button>
                <button class="timer-btn" onclick="resetTimer()">Сброс</button>
            </div>
        </div>
    </div>

    <div class="card" id="namingCard">
        <h2>2. Присвоить имя роли</h2>
        <div id="poolContainer" class="setup-pool">
            <p style="color:#888;">Укажите количество игроков и нажмите «Рассчитать»</p>
        </div>
    </div>

    <div class="card">
        <h2>3. Игроки за столом</h2>
        <div id="playerList" class="player-list">
            <p style="color:#888;">За столом пока нет игроков</p>
        </div>
    </div>

    <button class="clear-btn" onclick="clearGrimoire()">Сбросить всё и заново</button>
</div>

<audio id="audioEpilogue" src="Эпилог.mp3"></audio>
<audio id="audioNight" src="Ночь.mp3" loop></audio>
<audio id="audioSquare" src="Центральная площадь.mp3" loop></audio>
<audio id="audioClock" src="Часы.mp3" loop></audio>
<audio id="soundGood" src="Добро.mp3" preload="auto"></audio>
<audio id="soundEvil" src="Демон.mp3" preload="auto"></audio>

<script>
    let currentAudioTrack = null;
    let backgroundTrackBackup = null; 
    let backgroundTrackNameBackup = "";
    
    let timerInterval = null;
    let timeLeft = 30; 
    let timerRunning = false;
    let clockFadeInterval = null;

    function fadeAndPlay(newTrack, trackName, isTimerCall = false, targetVolume = 1.0) {
        const fadeTime = 800;
        const statusText = document.getElementById('audioStatusText');

        function fadeOut(audio, callback) {
            if (audio.paused) {
                if (callback) callback();
                return;
            }
            let volume = audio.volume;
            const interval = 50;
            const delta = volume / (fadeTime / interval);
            
            const timer = setInterval(() => {
                volume -= delta;
                if (volume <= 0) {
                    clearInterval(timer);
                    audio.pause();
                    audio.currentTime = 0;
                    if (callback) callback();
                } else {
                    audio.volume = volume;
                }
            }, interval);
        }

        if (isTimerCall && currentAudioTrack && currentAudioTrack.id !== 'audioClock') {
            backgroundTrackBackup = currentAudioTrack;
            backgroundTrackNameBackup = statusText.textContent;
        }

        if (currentAudioTrack) {
            fadeOut(currentAudioTrack, () => {
                startNewTrack();
            });
        } else {
            startNewTrack();
        }

        function startNewTrack() {
            if (!newTrack) {
                currentAudioTrack = null;
                statusText.textContent = "Аудио остановлено";
                return;
            }
            
            if (newTrack.id === 'audioClock') {
                newTrack.volume = 0;
                newTrack.play()
                    .then(() => {
                        currentAudioTrack = newTrack;
                        statusText.textContent = `Сейчас играет: ${trackName}`;
                        
                        let vol = 0;
                        clearInterval(clockFadeInterval);
                        clockFadeInterval = setInterval(() => {
                            vol += 0.05;
                            if (vol >= targetVolume) {
                                newTrack.volume = targetVolume;
                                clearInterval(clockFadeInterval);
                            } else {
                                newTrack.volume = vol;
                            }
                        }, 100);
                    })
                    .catch(err => {
                        statusText.textContent = "⚠️ Нажмите на страницу, чтобы разрешить звук в браузере";
                    });
            } else {
                newTrack.volume = 1.0;
                newTrack.play()
                    .then(() => {
                        currentAudioTrack = newTrack;
                        statusText.textContent = `Сейчас играет: ${trackName}`;
                    })
                    .catch(err => {
                        statusText.textContent = "⚠️ Нажмите на страницу, чтобы разрешить звук в браузере";
                    });
            }
        }
    }

    function switchPhase(phase) {
        backgroundTrackBackup = null;
        backgroundTrackNameBackup = "";
        clearInterval(clockFadeInterval);

        document.getElementById('btnPhaseStart').classList.remove('active-start');
        document.getElementById('btnPhaseNight').classList.remove('active-night');
        document.getElementById('btnPhaseDay').classList.remove('active-day');

        if (phase === 'start') {
            document.getElementById('btnPhaseStart').classList.add('active-start');
            fadeAndPlay(document.getElementById('audioEpilogue'), "🎬 Эпилог (Введение в игру — прозвучит 1 раз)");
        } else if (phase === 'night') {
            document.getElementById('btnPhaseNight').classList.add('active-night');
            fadeAndPlay(document.getElementById('audioNight'), "🌙 Мрачная Ночь (Зациклено)");
        } else if (phase === 'day') {
            document.getElementById('btnPhaseDay').classList.add('active-day');
            fadeAndPlay(document.getElementById('audioSquare'), "☀️ Центральная Площадь (Зациклено)");
        } else if (phase === 'stop') {
            fadeAndPlay(null, "");
        }
    }

    function updateTimerDisplay() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = 
            (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function fadeOutClock(clockTrack, callback) {
        clearInterval(clockFadeInterval);
        let vol = clockTrack.volume;
        clockFadeInterval = setInterval(() => {
            vol -= 0.05;
            if (vol <= 0) {
                clockTrack.volume = 0;
                clockTrack.pause();
                clearInterval(clockFadeInterval);
                if (callback) callback();
            } else {
                clockTrack.volume = vol;
            }
        }, 80);
    }

    function toggleTimer() {
        const startBtn = document.getElementById('timerStartBtn');
        const clockTrack = document.getElementById('audioClock');

        if (timerRunning) {
            clearInterval(timerInterval);
            timerRunning = false;
            startBtn.textContent = 'Старт';
            startBtn.style.background = '#2a7a2a';
            
            if (currentAudioTrack === clockTrack) {
                fadeOutClock(clockTrack);
            }
        } else {
            if (timerInterval === null && !timerRunning) {
                const inputVal = parseInt(document.getElementById('timerInput').value);
                timeLeft = isNaN(inputVal) ? 30 : inputVal;
            }
            
            timerRunning = true;
            startBtn.textContent = 'Пауза';
            startBtn.style.background = '#a67c1e';
            
            if (currentAudioTrack === clockTrack) {
                clockTrack.play();
                let vol = clockTrack.volume;
                clearInterval(clockFadeInterval);
                clockFadeInterval = setInterval(() => {
                    vol += 0.05;
                    if (vol >= 0.5) {
                        clockTrack.volume = 0.5;
                        clearInterval(clockFadeInterval);
                    } else {
                        clockTrack.volume = vol;
                    }
                }, 100);
            } else {
                fadeAndPlay(clockTrack, "⏱ Последнее слово (Часы.mp3 — 50% громкости)", true, 0.5);
            }
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerRunning = false;
                    startBtn.textContent = 'Старт';
                    startBtn.style.background = '#2a7a2a';
                    
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 587.33;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);

                    fadeOutClock(clockTrack, () => {
                        if (backgroundTrackBackup) {
                            fadeAndPlay(backgroundTrackBackup, backgroundTrackNameBackup.replace("Сейчас играет: ", ""));
                            backgroundTrackBackup = null;
                            backgroundTrackNameBackup = "";
                        } else {
                            fadeAndPlay(null, "");
                        }
                    });
                } else {
                    timeLeft--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        
        const inputVal = parseInt(document.getElementById('timerInput').value);
        timeLeft = isNaN(inputVal) ? 30 : inputVal;
        updateTimerDisplay();
        
        const startBtn = document.getElementById('timerStartBtn');
        startBtn.textContent = 'Старт';
        startBtn.style.background = '#2a7a2a';

        const clockTrack = document.getElementById('audioClock');
        
        if (currentAudioTrack === clockTrack) {
            fadeOutClock(clockTrack, () => {
                if (backgroundTrackBackup) {
                    fadeAndPlay(backgroundTrackBackup, backgroundTrackNameBackup.replace("Сейчас играет: ", ""));
                    backgroundTrackBackup = null;
                    backgroundTrackNameBackup = "";
                } else {
                    fadeAndPlay(null, "");
                }
            });
        }
    }

    document.getElementById('timerInput').addEventListener('input', function() {
        if (!timerRunning) {
            timeLeft = parseInt(this.value) || 30;
            updateTimerDisplay();
        }
    });

    // === 1. МАССИВ ВСЕХ РОЛЕЙ ===
    const allHeroes = [
        // --- ГОРОЖАНЕ ---
        { name: "Чтец", team: "горожанин", activity: "1", hint: "В 1-ю ночь указывает на 2 игроков, чтобы узнать, есть ли среди них Изгой (или пропускает)." },
        { name: "Повар", team: "горожанин", activity: "1", hint: "В 1-ю ночь узнаёт личность и роль одного горожанина от Мастера (или пропускает)." },
        { name: "Гадалка", team: "горожанин", activity: "every", hint: "Каждую ночь проверяет двух игроков на наличие Демона (может пропустить)." },
        { name: "Эмпат", team: "горожанин", activity: "every", hint: "Каждую ночь (если днем была казнь) узнает истинную роль казненного." },
        { name: "Монах", team: "горожанин", activity: "every", hint: "Каждую ночь защищает одного игрока (кроме себя) от атаки Демона или пропускает." },
        { name: "Фокусник", team: "горожанин", activity: "every", hint: "Каждую ночь может сделать 1 выбор за игру: указывает на игрока, который после смерти сможет голосовать КАЖДЫЙ день (а не 1 раз)." },
        { name: "Цветочница", team: "горожанин", activity: "every", hint: "Каждую ночь узнает, голосовал ли Демон днем за казнь (Да/Нет) или пропускает." },
        { name: "Сплетник", team: "горожанин", activity: "every", hint: "Каждую ночь тайно блокирует способности одного Приспешника или остается в тени." },
        { name: "Торговец", team: "горожанин", activity: "day", hint: "Обычный человек, не имеет активных способностей." },
        { name: "Судья", team: "горожанин", activity: "day", hint: "Дневная: 1 раз за игру при голосовании может удвоить свой голос или отменить казнь." },
        { name: "Кукловод", team: "горожанин", activity: "day", hint: "Дневная: 1 раз за игру во время голосования принудительно меняет чей-то голос." },
        { name: "Смотритель", team: "горожанин", activity: "day", hint: "Пассивная: Просыпается ТОЛЬКО при ночной смерти. Узнает роль любого игрока." },
        { name: "Святой", team: "горожанин", activity: "day", hint: "Пассивная: Приносит поражение добру, если его казнят днем." },
        { name: "Рыцарь", team: "горожанин", activity: "day", hint: "Пассивная: Имеет постоянный иммунитет к ночному убийству Демоном." },
        { name: "Эхо", team: "горожанин", activity: "day", hint: "Пассивная: Убивает одного Приспешника в ответ, если сам погибает от Демона." },

        // --- ИЗГОИ ---
        { name: "Медиум", team: "изгой", activity: "day", hint: "Пассивная (Изгой): При дневной казни на след. день все ночные проверки инвертируются." },
        { name: "Проклятый", team: "изгой", activity: "day", hint: "Пассивная (Изгой): Забирает с собой случайного доброго игрока при ночной гибели." },

        // --- ПРИСПЕШНИКИ ---
        { name: "Барон", team: "приспешник", activity: "1", hint: "В 1-ю ночь знакомится со Злом. Пассивно: заменяет сильных горожан на слабых изгоев." },
        { name: "Травитель", team: "приспешник", activity: "every", hint: "Каждую ночь заставляет чужую силу давать ложный результат или пропускает." },
        { name: "Падшая", team: "приспешник", activity: "every", hint: "Просыпается каждую ночь ТОЛЬКО если стала Демоном. Выбирает жертву для убийства." },

        // --- ДЕМОН ---
        { name: "Лилит (Демон)", team: "демон", activity: "every", hint: "Каждую ночь совершает убийство. Может убить себя, чтобы передать силу Демона Падшей." }
    ];

    const distributionTable = {
        5:  { горожанин: 3, изгой: 0, приспешник: 1, демон: 1 },
        6:  { горожанин: 3, изгой: 1, приспешник: 1, демон: 1 },
        7:  { горожанин: 5, изгой: 0, приспешник: 1, демон: 1 },
        8:  { горожанин: 5, изгой: 1, приспешник: 1, демон: 1 },
        9:  { горожанин: 5, изгой: 2, приспешник: 1, демон: 1 },
        10: { горожанин: 7, изгой: 0, приспешник: 2, демон: 1 },
        11: { горожанин: 7, изгой: 1, приспешник: 2, демон: 1 },
        12: { горожанин: 7, изгой: 2, приспешник: 2, демон: 1 },
        13: { горожанин: 9, изгой: 1, приспешник: 2, демон: 1 },
        14: { горожанин: 9, изгой: 1, приспешник: 3, демон: 1 },
        15: { горожанин: 9, изгой: 2, приспешник: 3, демон: 1 }
    };

    let players = [];
    let currentPool = [];

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function setupGame() {
        const countInput = document.getElementById('totalPlayersCount');
        const count = parseInt(countInput.value);

        if (!count || count < 5 || count > 15) {
            alert("Пожалуйста, укажите количество игроков от 5 до 15.");
            return;
        }

        const dist = distributionTable[count];
        const tfPool = shuffle(allHeroes.filter(h => h.team === 'горожанин'));
        const outPool = shuffle(allHeroes.filter(h => h.team === 'изгой'));
        const minPool = shuffle(allHeroes.filter(h => h.team === 'приспешник'));
        const demPool = shuffle(allHeroes.filter(h => h.team === 'демон'));

        currentPool = [
            ...tfPool.slice(0, dist.горожанин),
            ...outPool.slice(0, dist.изгой),
            ...minPool.slice(0, dist.приспешник),
            ...demPool.slice(0, dist.демон)
        ];

        currentPool = shuffle(currentPool);
        players = [];
        renderPool();
        render();
    }

    function assignNameToRole(roleIndex, name) {
        if (!name.trim()) {
            alert("Введите имя игрока!");
            return;
        }
        const role = currentPool[roleIndex];

        players.push({
            id: Date.now() + Math.random(),
            name: name.trim(),
            role: role.name,
            team: role.team,
            activity: role.activity,
            hint: role.hint,
            dead: false,
            poisoned: false,
            protected: false,
            hasVote: true,
            usedAbility: false,
            silenced: false,
            hasInfiniteVote: false
        });

        currentPool.splice(roleIndex, 1);
        renderPool();
        render();
    }

    function toggleDead(id) {
        const p = players.find(x => x.id === id);
        if (p) {
            p.dead = !p.dead;
            if (!p.dead || p.hasInfiniteVote) p.hasVote = true;
            render();
            checkGameOver();
        }
    }

    function toggleVote(id) {
        const p = players.find(x => x.id === id);
        if (p) { p.hasVote = !p.hasVote; render(); }
    }

    function togglePoison(id) {
        const p = players.find(x => x.id === id);
        if (p) { p.poisoned = !p.poisoned; render(); }
    }

    function toggleProject(id) {
        const p = players.find(x => x.id === id);
        if (p) { p.protected = !p.protected; render(); }
    }

    function toggleUsedAbility(id) {
        const p = players.find(x => x.id === id);
        if (p) { p.usedAbility = !p.usedAbility; render(); }
    }

    function toggleSilenced(id) {
        const p = players.find(x => x.id === id);
        if (p) { p.silenced = !p.silenced; render(); }
    }

    function toggleInfiniteVote(id) {
        const p = players.find(x => x.id === id);
        if (p) { 
            p.hasInfiniteVote = !p.hasInfiniteVote; 
            if (p.hasInfiniteVote) p.hasVote = true;
            render(); 
        }
    }

    function deletePlayer(id) {
        const idx = players.findIndex(x => x.id === id);
        if (idx !== -1) {
            const p = players[idx];
            currentPool.push({ name: p.role, team: p.team, activity: p.activity, hint: p.hint });
            players.splice(idx, 1);
            renderPool();
            render();
        }
    }

    function demonSelfKill(demonId) {
        const demon = players.find(x => x.id === demonId);
        if (!demon) return;

        if (!confirm(`Демон (${demon.name}) убивает себя! Передать силу Демона Приспешнику?`)) return;

        demon.dead = true;
        const fallen = players.find(p => p.role === 'Падшая' && !p.dead);

        if (fallen) {
            fallen.role = 'Лилит (Демон)';
            fallen.team = 'демон';
            fallen.hint = 'Приняла силу Демона от погибшей Лилит!';
            alert(`🔥 Демон погиб! Игрок ${fallen.name} (Падшая) становится новым Демоном!`);
        } else {
            const minion = players.find(p => p.team === 'приспешник' && !p.dead);
            if (minion) {
                if (confirm(`Падшей нет. Сделать роль "${minion.role}" (${minion.name}) новым Демоном?`)) {
                    minion.role = 'Лилит (Демон)';
                    minion.team = 'демон';
                    minion.hint = 'Принял(а) силу Демона после самоубийства Лилит!';
                    alert(`🔥 Игрок ${minion.name} теперь новый Демон!`);
                }
            } else {
                alert("⚠️ Живых Приспешников за столом не найдено!");
            }
        }
        render();
        checkGameOver();
    }

    function endGame(winner) {
        document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
        if (winner === 'добро') {
            const sound = document.getElementById('soundGood');
            if (sound) sound.play();
            alert("🎉 ПОБЕДА ГОРОЖАН (ДОБРО)!");
        } else if (winner === 'зло') {
            const sound = document.getElementById('soundEvil');
            if (sound) sound.play();
            alert("👹 ПОБЕДА ДЕМОНА (ЗЛО)!");
        }
    }

    function checkGameOver() {
        let livingGood = 0;
        let livingEvil = 0;
        let isDemonAlive = false;

        players.forEach(p => {
            if (!p.dead) {
                if (p.team === 'демон') { livingEvil++; isDemonAlive = true; }
                else if (p.team === 'приспешник') { livingEvil++; }
                else if (p.team === 'горожанин' || p.team === 'изгой') { livingGood++; }
            }
        });

        if (players.length > 0) {
            if (!isDemonAlive) endGame('добро');
            else if (livingEvil > 0 && livingGood <= 1) endGame('зло');
        }
    }

    function renderPool() {
        const poolContainer = document.getElementById('poolContainer');
        if (!poolContainer) return;

        if (currentPool.length === 0) {
            poolContainer.innerHTML = `<p style="color:#888;">Все карты ролей распределены!</p>`;
            return;
        }

        poolContainer.innerHTML = currentPool.map((r, i) => `
            <div style="background:#222; border:1px solid #444; padding:10px; margin:6px 0; border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <b style="color:#ffcc00; font-size:1.1rem;">${r.name}</b> <small class="badge-${r.team}">(${r.team})</small>
                </div>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="input_role_${i}" placeholder="Имя игрока" style="padding:6px; border-radius:4px; border:1px solid #555; background:#111; color:#fff;">
                    <button onclick="assignNameToRole(${i}, document.getElementById('input_role_${i}').value)" class="btn-add">✓ В стол</button>
                </div>
            </div>
        `).join('');
    }

    function render() {
        const listContainer = document.getElementById('playerList');
        if (!listContainer) return;

        if (players.length === 0) {
            listContainer.innerHTML = `<p style="color:#888;">За столом пока нет игроков</p>`;
            return;
        }

        listContainer.innerHTML = players.map(p => `
            <div class="card-${p.team}" style="margin:10px 0; padding:12px; border-radius:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>${p.name} — <span style="color:#ffcc00;">${p.role}</span></h3>
                    <span>${p.dead ? '💀 МЕРТВ' : '🟢 ЖИВ'}</span>
                </div>
                <p style="font-size:0.85rem; color:#aaa; margin:4px 0;">${p.hint}</p>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-top:8px;">
                    <button onclick="toggleDead(${p.id})" style="padding:6px; background:${p.dead ? '#555' : '#28a745'}; color:#fff; border:none; border-radius:4px;">
                        ${p.dead ? 'Воскресить' : 'Убить'}
                    </button>

                    ${p.dead ? `
                        <button onclick="toggleVote(${p.id})" style="padding:6px; background:${p.hasVote ? '#007bff' : '#444'}; color:#fff; border:none; border-radius:4px;">
                            Голос: ${p.hasVote ? '🎫 Есть' : '❌ Нет'}
                        </button>
                    ` : ''}

                    <button onclick="togglePoison(${p.id})" style="padding:6px; background:${p.poisoned ? '#8a2be2' : '#333'}; color:#fff; border:none; border-radius:4px;">
                        ${p.poisoned ? '🤢 Отравлен' : '💎 Здоров'}
                    </button>

                    <button onclick="toggleProject(${p.id})" style="padding:6px; background:${p.protected ? '#17a2b8' : '#333'}; color:#fff; border:none; border-radius:4px;">
                        ${p.protected ? '🛡 Под защитой' : '🌕 Без защиты'}
                    </button>

                    <button onclick="toggleSilenced(${p.id})" style="padding:6px; background:${p.silenced ? '#6c757d' : '#333'}; color:#fff; border:none; border-radius:4px;">
                        ${p.silenced ? '🔇 Блок Сплетника' : '🔊 Активен'}
                    </button>

                    <button onclick="toggleInfiniteVote(${p.id})" style="padding:6px; background:${p.hasInfiniteVote ? '#9b51e0' : '#333'}; color:#fff; border:none; border-radius:4px;">
                        ${p.hasInfiniteVote ? '✨ Вечный голос' : '⚪ Обычный голос'}
                    </button>

                    ${(p.role === 'Судья' || p.role === 'Кукловод' || p.role === 'Фокусник') ? `
                        <button onclick="toggleUsedAbility(${p.id})" style="padding:6px; background:${p.usedAbility ? '#dc3545' : '#ffc107'}; color:${p.usedAbility ? '#fff' : '#000'}; border:none; border-radius:4px; grid-column: span 2;">
                            Способность: ${p.usedAbility ? '❌ Использована' : '⚡️ Готова'}
                        </button>
                    ` : ''}

                    ${(p.team === 'демон' && !p.dead) ? `
                        <button onclick="demonSelfKill(${p.id})" style="padding:8px; background:#610505; color:#ff9999; border:1px solid #ff0000; border-radius:4px; font-weight:bold; grid-column: span 2; cursor:pointer;">
                            👹 СЕЛЬФ-КИЛЛ: Убить себя и передать силу
                        </button>
                    ` : ''}

                    <button onclick="deletePlayer(${p.id})" style="padding:6px; background:#2a1212; color:#ff8888; border:1px solid #4a1c1c; border-radius:4px; grid-column: span 2; margin-top:4px;">
                        🗑 Вернуть карту в пул
                    </button>
                </div>
            </div>
        `).join('');
    }

    function clearGrimoire() {
        if (confirm("Вы уверены, что хотите сбросить всю партию?")) {
            players = [];
            currentPool = [];
            renderPool();
            render();
        }
    }

    updateTimerDisplay();
</script>

</body>
</html>
